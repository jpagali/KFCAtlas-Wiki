      });

      document.querySelectorAll("[data-action='to-delivery-map']").forEach((el) => {
        el.addEventListener("click", () => {
          if (!state.deliveryAddressInput.trim() && !state.selectedAddressId) return;
          navigate("deliveryMap");
        });
      });

      document.querySelectorAll("[data-address]").forEach((el) => {
        el.addEventListener("click", () => {
          const suggestion = addressSuggestions.find((item) => item.id === el.dataset.address);
          if (!suggestion) return;
          commit(() => {
            state.selectedAddressId = suggestion.id;
            state.deliveryAddressInput = suggestion.address[state.locale];
          });

      document.querySelectorAll("[data-action='detail-add']").forEach((el) => {
        el.addEventListener("click", addFromDetail);
      });

      document.querySelectorAll("[data-action='start-order-prompt']").forEach((el) => {

          window.alert(t().labels.browseOnlyAlert);
          navigate("location");
        });
      });

      document.querySelectorAll("[data-action='place-order']").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.screen = "confirmation";
          });
        });
      });

      document.querySelectorAll("[data-action='reset']").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.screen = "home";
            state.cart = [];
            state.claimedPromos = [];
            state.storeId = null;
            state.hasChosenStore = false;
            state.confirmedAddress = "";
            state.selectedAddressId = null;
            state.deliveryAddressInput = "";
            state.mode = "pickup";
            state.browseOnlyMenu = false;
          });
        });
      });

      document.querySelectorAll("[data-open-nutrition]").forEach((el) => {
        el.addEventListener("click", (event) => {
          event.stopPropagation();
          openNutritionModal();
        });
      });

      document.querySelectorAll("[data-claim-promo]").forEach((el) => {
        el.addEventListener("click", () => {
          const promoId = el.dataset.claimPromo;
          if (state.claimedPromos.includes(promoId)) return;
          const promos = getPromoSlides();
          const promo = promos.find((p) => p.id === promoId);
          if (!promo || promo.locked) return;
          commit(() => {
            state.claimedPromos.push(promoId);
            state.cart.push({
              key: `promo-${promoId}`,
              id: promoId,
              emoji: promo.emoji,
              image: promo.image,
              name: promo.title,
              price: 0,
              qty: 1,
              summary: promo.badge
            });
          });
          showToast(`${promo.title} added to order!`, "FREE");
        });
      });

      document.querySelectorAll("[data-redeem]").forEach((el) => {
        el.addEventListener("click", () => {
          const cost = Number(el.dataset.redeem);
          if (cost > 1000) return;
          showToast(t().toasts.redeemed, `-${cost}`);
        });
      });

      const search = document.getElementById("menu-search");
      if (search) {
        search.addEventListener("input", () => {
          state.search = search.value;
          render();
        });
      }

      const address1 = document.getElementById("address1");
      const address2 = document.getElementById("address2");
      const deliveryAddressInput = document.getElementById("delivery-address-input");
      const orderNotes = document.getElementById("order-notes");
      if (address1) address1.addEventListener("input", () => { state.checkout.address1 = address1.value; });
      if (address2) address2.addEventListener("input", () => { state.checkout.address2 = address2.value; });
      if (deliveryAddressInput) {
        deliveryAddressInput.addEventListener("input", () => {
          state.deliveryAddressInput = deliveryAddressInput.value;
          state.selectedAddressId = null;
          render();
        });
      }
      if (orderNotes) orderNotes.addEventListener("input", () => { state.checkout.notes = orderNotes.value; });

      const couponInput = document.getElementById("coupon-code-input");
      if (couponInput) {
        couponInput.addEventListener("input", () => {
          state.checkout.couponCode = couponInput.value;
          state.checkout.couponApplied = false;
        });
      }

      document.querySelectorAll("[data-action='apply-coupon']").forEach((el) => {
        el.addEventListener("click", () => {
          const code = state.checkout.couponCode.trim().toUpperCase();
          if (!code) return;
          // Prototype: any non-empty code "works" to demo the applied state
          commit(() => {
            state.checkout.couponApplied = true;
            state.checkout.couponCode = code;
          });
          showToast(t().labels.promoApplied, "−10%");
        });
      });
    }

    function quickAdd(productId) {
      if (state.browseOnlyMenu) {
        window.alert(t().labels.browseOnlyAlert);
        navigate("location");
        return;
      }
      const product = getProduct(productId);
      const options = getSelectedOptions(product);
      const key = [product.id, options.heat, options.size, ...options.extras].join("|");
      const existing = state.cart.find((item) => item.key === key);

      commit(() => {
        if (existing) {
          existing.qty += 1;
        } else {
          state.cart.push({
            key,
            id: product.id,
            emoji: product.emoji,
            image: product.image,
            name: product.name[state.locale],
            price: product.basePrice,
            qty: 1,
            summary: [options.heat, options.size, ...options.extras].filter(Boolean).join(" · ")
          });
        }
      });

      showToast(t().toasts.added, "+50");
    }

    function addFromDetail() {
      if (state.browseOnlyMenu) {
        window.alert(t().labels.browseOnlyAlert);
        navigate("location");
        return;

      const product = getProduct(state.selectedProductId);
      const options = getSelectedOptions(product);
      const key = [product.id, options.heat, options.size, ...options.extras].join("|");
      const existing = state.cart.find((item) => item.key === key);

      commit(() => {
        if (existing) {
          existing.qty += state.detailQty;
        } else {
          state.cart.push({
            key,
            id: product.id,
            emoji: product.emoji,
            image: product.image,
            name: product.name[state.locale],
            price: product.basePrice + (options.extras.length * 0.5),
            qty: state.detailQty,
            summary: [options.heat, options.size, ...options.extras].filter(Boolean).join(" · ")
          });
        }
        state.screen = "cart";
      });

      showToast(t().toasts.added, `+${state.detailQty * 50}`);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // ─── Nutrition Modal ──────────────────────────────────────────
    const nutritionModalEl   = document.getElementById("nutrition-modal");
    const nutritionScrimEl   = document.getElementById("nutrition-scrim");
    const nutritionBodyEl    = document.getElementById("nutrition-modal-body");
    const nutritionTitleEl   = document.getElementById("nutrition-modal-title");
    const nutritionKjEl      = document.getElementById("nutrition-modal-kj");
    const nutritionCloseBtn  = document.getElementById("nutrition-close-btn");

    function renderNutritionBody() {
      if (nutritionModalTab === "nutrition") {
        nutritionBodyEl.innerHTML = `
          <table class="nutrition-table">
            <thead>
              <tr>
                <th>Nutrient</th>
                <th>Per Serve</th>
              </tr>
            </thead>
            <tbody>
              ${nutritionData.nutrition.map((row) => `
                <tr class="${row.highlight ? "nt-highlight" : ""}${row.sub ? " nt-sub" : ""}">
                  <td>${escapeHtml(row.label)}</td>
                  <td>${escapeHtml(row.value)} ${escapeHtml(row.unit)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `;
      } else {
        nutritionBodyEl.innerHTML = `
          <div class="allergen-legend">
            <div class="allergen-legend-item"><div class="allergen-dot present"></div>Present</div>
            <div class="allergen-legend-item"><div class="allergen-dot na"></div>N/A</div>
          </div>
          <div>
            ${nutritionData.allergens.map((a) => `
              <div class="allergen-row">
                <span class="allergen-name">${escapeHtml(a.name)}</span>
                <span class="allergen-status ${a.status}">${a.status === "present" ? "Present" : "N/A"}</span>
              </div>
            `).join("")}
          </div>
          <div class="nutrition-disclaimer">
            ${nutritionData.disclaimer.map((line) => `<p>${escapeHtml(line)}</p>`).join("")}
          </div>
        `;
      }
    }

    function openNutritionModal() {
      nutritionModalTab = "nutrition";
      nutritionTitleEl.textContent = nutritionData.name;
      nutritionKjEl.textContent = `${nutritionData.kj.toLocaleString()} kJ per serve`;
      document.querySelectorAll(".nutrition-tab").forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.ntab === nutritionModalTab);
      });
      renderNutritionBody();
      nutritionModalEl.classList.add("open");
      nutritionScrimEl.classList.add("open");
    }

    function closeNutritionModal() {
      nutritionModalEl.classList.remove("open");
      nutritionScrimEl.classList.remove("open");
    }

    nutritionCloseBtn.addEventListener("click", closeNutritionModal);
    nutritionScrimEl.addEventListener("click", closeNutritionModal);

    document.querySelectorAll(".nutrition-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        nutritionModalTab = tab.dataset.ntab;
        document.querySelectorAll(".nutrition-tab").forEach((t) => {
          t.classList.toggle("active", t.dataset.ntab === nutritionModalTab);
        });
        renderNutritionBody();
      });
    });

    function render() {
      closeSheet();
      renderTopbar();
      renderJourneyShellBar();
      renderBottomNav();
      els.content.innerHTML = renderScreen();
      if (state.screen !== "detail") {
        els.detailFooter.hidden = true;
        els.detailFooter.innerHTML = "";
      }
      attachEvents();
    }

    els.back.addEventListener("click", goBack);
    els.forward.addEventListener("click", goForward);
    fullscreenBtn.addEventListener("click", async () => {
      if (window.self !== window.top) {
        embeddedFullscreenMode = !embeddedFullscreenMode;
        stageEl.classList.toggle("fullscreen-mode", embeddedFullscreenMode);
        window.parent.postMessage(
          { type: "rna-prototype-fullscreen", enabled: embeddedFullscreenMode },
          window.location.origin
        );
        renderTopbar();
        return;
      }

      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else if (stageEl.requestFullscreen) {
        await stageEl.requestFullscreen();
      } else {
        stageEl.classList.toggle("fullscreen-mode");
      }
      renderTopbar();
    });
    document.addEventListener("fullscreenchange", () => {
      renderTopbar();
    });
    document.querySelectorAll("[data-locale]").forEach((button) => {
      button.addEventListener("click", () => setLocale(button.dataset.locale));
    });

    document.getElementById("shell-chip-mode").addEventListener("click", () => openSheet("mode"));
    document.getElementById("shell-chip-time").addEventListener("click", () => openSheet("time"));

    render();
  </script>
</body>
</html>
