<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RNA Ordering Prototype</title>
  <style>
    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("../../static/fonts/kfc/KentuckyFriedSans-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "Kentucky Fried Sans";
      src: url("../../static/fonts/kfc/KentuckyFriedSans-Semibold.ttf") format("truetype");
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: "Kentucky Fried Serif";
      src: url("../../static/fonts/kfc/KentuckyFriedSerif-BlackItalic.ttf") format("truetype");
      font-weight: 800 900;
      font-style: italic;
    }

    :root {
      --bg: #080808;
      --panel: #121212;
      --panel-2: #1b1b1b;
      --panel-3: #252525;
      --line: rgba(255, 255, 255, 0.08);
      --text: #fff8f1;
      --muted: rgba(255, 248, 241, 0.64);
      --red: #e4002b;
      --red-soft: rgba(228, 0, 43, 0.18);
      --gold: #ffbf5b;
      --green: #52d890;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: "Kentucky Fried Serif", Georgia, serif;
      --font-body: "Kentucky Fried Serif", Georgia, serif;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    html[data-theme="light"] {
      --bg: #f6efe8;
      --panel: #fff9f3;
      --panel-2: #f4ece4;
      --panel-3: #ede2d8;
      --line: rgba(66, 40, 30, 0.1);
      --text: #231815;
      --muted: rgba(35, 24, 21, 0.64);
      --red-soft: rgba(228, 0, 43, 0.08);
      --shadow: 0 24px 60px rgba(71, 47, 36, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.14), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.1), transparent 20%),
        #050505;
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 800;
      color: var(--text);
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .status-bar,
    .web-brand-title,
    .web-brand-subtitle,
    .web-link,
    .web-locale-switch .toggle-btn,
    .eyebrow,
    .screen-title,
    .screen-subtitle,
    .journey-shell-chip,
    .mini-hero-card h4,
    .mini-hero-card p,
    .promo-banner h3,
    .promo-banner p,
    .mode-warning,
    .map-pin,
    .map-store-badge,
    .map-rider,
    .hero-card h3,
    .hero-card p,
    .card p,
    .meta,
    .store-address,
    .store-note,
    .helper,
    .cart-meta,
    .product-card .meta,
    .product-card .helper,
    .search input,
    .search input::placeholder,
    .rank-meta,
    .support-display,
    .rank-card-title,
    .rank-meter,
    .perk-card strong,
    .perk-card p,
    .context-strip strong,
    .section-head h4,
    .section-tag,
    .pill,
    .pill small,
    .store-name,
    .badge,
    .category-tab,
    .product-title,
    .mini-btn,
    .price,
    .detail-name,
    .option-label,
    .qty-value,
    .cta,
    .ghost-btn,
    .cart-title,
    .summary-row,
    .pay-summary .summary-row strong,
    .total,
    .checkout-field input,
    .track-labels,
    .nav-btn-label {
      font-style: normal;
    }

    html[data-theme="light"] body {
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.08), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.08), transparent 20%),
        #f7f0e8;
    }

    button, input {
      font: inherit;
    }

    .stage {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(8px, 2vw, 24px);
    }

    .phone-wrap {
      position: relative;
      width: min(390px, calc(100vw - 16px));
      height: min(844px, calc(100vh - 16px));
      height: min(844px, calc(100dvh - 16px));
      aspect-ratio: 390 / 844;
      border-radius: 54px;
      padding: 12px;
      background: linear-gradient(180deg, #1f1f1f 0%, #0d0d0d 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .phone-wrap {
      background: linear-gradient(180deg, #efe5dc 0%, #d9cec3 100%);
      border-color: rgba(66, 40, 30, 0.12);
    }

    .phone-wrap::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 30px;
      border-radius: 999px;
      background: #050505;
      z-index: 30;
    }

    html[data-theme="light"] .phone-wrap::before {
      background: #dad0c7;
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 42px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 18%),
        #0b0b0b;
    }

    html[data-theme="light"] .phone {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), transparent 18%),
        #fff9f3;
    }

    .ambient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 85% 18%, rgba(228, 0, 43, 0.18), transparent 22%),
        radial-gradient(circle at 18% 78%, rgba(255, 191, 91, 0.08), transparent 24%);
      opacity: 0.9;
    }

    html[data-theme="light"] .ambient {
      background:
        radial-gradient(circle at 85% 18%, rgba(228, 0, 43, 0.1), transparent 22%),
        radial-gradient(circle at 18% 78%, rgba(255, 191, 91, 0.08), transparent 24%);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 25;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 0;
      height: 52px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      font-family: var(--font-body);
      font-weight: 700;
    }

    html[data-theme="light"] .status-bar {
      color: rgba(35, 24, 21, 0.86);
    }

    .viewport {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 88px 18px 10px;
      display: block;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.84);
      backdrop-filter: blur(18px);
      position: relative;
    }

    html[data-theme="light"] .topbar {
      border-bottom-color: rgba(66, 40, 30, 0.08);
      background: rgba(255, 249, 243, 0.92);
    }

    .topbar-left {
      min-width: 0;
    }

    .topbar.journey-mode {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      column-gap: 18px;
    }

    .topbar.journey-mode .topbar-left {
      display: flex;
      align-items: end;
      min-height: 72px;
    }

    .topbar.journey-mode .eyebrow,
    .topbar.journey-mode .screen-subtitle {
      display: none;
    }

    .web-nav {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(12, 12, 12, 0.92);
      backdrop-filter: blur(18px);
    }

    .web-brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .web-brand img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.06);
      padding: 4px;
    }

    .web-brand-copy {
      min-width: 0;
    }

    .web-brand-title {
      font-family: var(--font-body);
      font-size: 23px;
      line-height: 0.98;
      letter-spacing: 0;
      font-weight: 900;
      text-transform: uppercase;
    }

    .web-brand-subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: var(--font-body);
      font-weight: 800;
    }

    .web-links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .web-nav-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .web-locale-switch {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .web-locale-switch {
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(66, 40, 30, 0.1);
    }

    .web-link {
      border: 0;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      font-family: var(--font-body);
      font-style: italic;
      text-transform: uppercase;
    }

    .web-link.active {
      background: rgba(228, 0, 43, 0.16);
      color: white;
    }

    .web-locale-switch .toggle-btn {
      min-width: 40px;
      height: 32px;
      padding: 0 12px;
      background: transparent;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      font-family: var(--font-body);
      font-weight: 800;
      font-style: italic;
    }

    .web-locale-switch .toggle-btn.active {
      background: var(--red);
      color: white;
    }
    .eyebrow:empty {
      display: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: #ff9eb1;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
      font-family: var(--font-body);
      font-style: italic;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 16px rgba(228, 0, 43, 0.45);
    }

    .screen-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 38px;
      line-height: 0.9;
      letter-spacing: 0.01em;
      font-style: italic;
      text-transform: uppercase;
    }

    .screen-title.hero-xl {
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0;
    }

    .screen-title.screen-title-logo {
      display: flex;
      align-items: center;
      min-height: 45px;
      letter-spacing: 0;
    }

    .screen-title-logo-link {
      display: inline-flex;
      align-items: center;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .screen-title-logo-image {
      display: block;
      width: 74px;
      max-width: min(20vw, 74px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.24));
    }

    .topbar.compact .screen-title {
      font-size: 22px;
      line-height: 0.95;
    }

    .screen-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      max-width: 210px;
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 800;
    }

    .topbar.compact .screen-subtitle {
      display: none;
    }

    .journey-shell-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0;
      margin-top: 0;
      padding: 0;
      border-top: 0;
      background: transparent;
      position: relative;
      z-index: 18;
      align-self: end;
    }

    .journey-shell-bar[hidden] {
      display: none;
    }

    .journey-shell-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 22px;
      min-width: 0;
      flex: 0 0 auto;
      flex-wrap: nowrap;
      overflow: visible;
      padding: 16px 18px;
      border-radius: 0;
      background: rgba(0, 0, 0, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .journey-shell-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: auto;
      border: 0;
      background: transparent;
      color: #ffffff;
      padding: 0;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      text-decoration: none;
      font-style: italic;
      text-transform: uppercase;
    }

    .journey-shell-chip span {
      overflow: visible;
      text-overflow: clip;
    }

    .journey-shell-chevron {
      width: 13px;
      height: 13px;
      flex: 0 0 auto;
      opacity: 0.95;
    }

    .screen-back-row {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 8px;
    }

    .screen-back-row .screen-back-btn {
      width: fit-content;
      min-width: 0;
      max-width: max-content;
      min-height: clamp(20px, 3vw, 24px);
      height: auto;
      flex: 0 0 auto;
      align-self: flex-start;
      padding: 0 4px 0 0;
      border-radius: 0;
      font-size: clamp(9px, 1.8vw, 10px);
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      background: transparent;
      color: var(--muted);
      justify-content: flex-start;
      box-shadow: none;
      display: inline-flex;
    }

    .toolbar {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
      z-index: 28;
    }

    .nav-cluster,
    .locale-switch,
    .view-switch {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 4px;
      border-radius: 999px;
      background: rgba(22, 22, 22, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    html[data-theme="light"] .nav-cluster,
    html[data-theme="light"] .locale-switch,
    html[data-theme="light"] .view-switch {
      background: rgba(255, 249, 243, 0.98);
      border-color: rgba(66, 40, 30, 0.1);
      box-shadow: 0 10px 24px rgba(71, 47, 36, 0.12);
    }

    .icon-btn,
    .toggle-btn,
    .pill,
    .nav-btn,
    .cta,
    .ghost-btn,
    .qty-btn {
      border: 0;
      cursor: pointer;
      transition: transform 0.15s var(--ease), background 0.15s var(--ease), opacity 0.15s var(--ease);
    }

    .icon-btn,
    .toggle-btn,
    .pill,
    .ghost-btn,
    .qty-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .icon-btn,
    .toggle-btn {
      min-width: 38px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .toggle-btn {
      padding: 0 14px;
      min-width: auto;
    }

    .view-btn {
      min-width: auto;
      padding: 0 14px;
      font-size: 11px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .mini-hero-card {
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.16), transparent 30%),
        linear-gradient(135deg, rgba(30, 8, 10, 0.9), rgba(15, 14, 14, 0.92));
    }

    html[data-theme="light"] .mini-hero-card {
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.08), transparent 30%),
        linear-gradient(135deg, rgba(255, 249, 243, 0.98), rgba(248, 238, 231, 0.98));
    }

    .mini-hero-card h4 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 900;
      font-family: var(--font-display);
      font-style: italic;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .mini-hero-card p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      font-family: var(--font-body);
      font-style: italic;
    }

    .promo-banner {
      position: relative;
      overflow: hidden;
      min-height: 184px;
      border-radius: var(--radius-lg);
      border: 0;
      background:
        linear-gradient(180deg, rgba(8, 8, 8, 0.08), rgba(8, 8, 8, 0.55)),
        url("https://images.ctfassets.net/a2mgcrjjefyo/5VacEuaF9u5SJ5bOx5bsd9/5922fe00c43d0d18120d50006576b2ac/Web_750x1040_EN.png?w=430&fm=webp") center/cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(94, 43, 24, 0.9);
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .promo-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 8, 8, 0.04), rgba(8, 8, 8, 0.82));
    }

    .promo-banner-body {
      position: relative;
      z-index: 1;
      max-width: 78%;
    }

    .promo-banner h3 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.05;
      font-weight: 900;
      font-family: var(--font-display);
      font-style: italic;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .promo-banner p {
      margin: 0;
      color: rgba(255, 248, 241, 0.84);
      font-size: 12px;
      line-height: 1.45;
      font-family: var(--font-body);
      font-style: italic;
    }

    .mode-warning {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 191, 91, 0.12);
      border: 1px solid rgba(255, 191, 91, 0.2);
      color: var(--gold);
      font-size: 11px;
      line-height: 1.45;
      font-family: var(--font-body);
      font-style: italic;
    }

    .map-card {
      position: relative;
      min-height: 190px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(244, 112, 137, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        #101010;
    }

    html[data-theme="light"] .map-card {
      background:
        linear-gradient(135deg, rgba(244, 112, 137, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 238, 230, 0.94));
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: 0.36;
    }

    html[data-theme="light"] .map-grid {
      background-image:
        linear-gradient(rgba(66, 40, 30, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(66, 40, 30, 0.08) 1px, transparent 1px);
    }

    .map-route {
      position: absolute;
      left: 18%;
      top: 25%;
      width: 56%;
      height: 46%;
      border: 3px solid rgba(228, 0, 43, 0.4);
      border-color: transparent transparent rgba(228, 0, 43, 0.68) rgba(228, 0, 43, 0.68);
      border-radius: 50px 0 80px 50px;
      transform: rotate(-8deg);
    }

    .map-pin,
    .map-store-badge,
    .map-rider {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      font-family: var(--font-body);
      font-style: italic;
      background: rgba(18, 18, 18, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .map-pin,
    html[data-theme="light"] .map-store-badge,
    html[data-theme="light"] .map-rider {
      background: rgba(255, 249, 243, 0.96);
      border-color: rgba(66, 40, 30, 0.1);
    }

    .map-pin {
      right: 18px;
      bottom: 18px;
    }

    .map-store-badge {
      left: 16px;
      top: 16px;
      color: var(--green);
    }

    .map-rider {
      left: 42%;
      top: 48%;
      color: var(--gold);
    }

    .toggle-btn.active {
      background: var(--red);
    }

    .icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 108px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.26) rgba(255, 255, 255, 0.06);
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.26);
      border-radius: 999px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.38);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card,
    .hero-card,
    .product-card,
    .cart-item,
    .sheet {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    /* ── Reward item cards ──────────────────────────── */
    .reward-item {
      position: relative;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
      min-height: 130px;
    }

    .reward-item.redeemed {
      opacity: 0.55;
    }

    .reward-item-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 14px 8px 14px 16px;
    }

    .reward-item-title {
      font-family: var(--font-display);
      font-size: 24px;
      font-style: italic;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.95;
      letter-spacing: 0.01em;
      margin: 2px 0 0;
    }

    .reward-item-desc {
      margin: 0;
      font-size: 12px;
      font-family: var(--font-body);
      font-style: italic;
      line-height: 1.4;
      opacity: 0.65;
    }

    .reward-item-cta {
      margin-top: auto;
      padding-top: 10px;
    }

    .reward-item-cta .ghost-btn {
      min-height: 36px;
      font-size: 13px;
      padding: 0 14px;
      width: auto;
    }

    .reward-item-img-wrap {
      flex-shrink: 0;
      width: 120px;
      position: relative;
      overflow: visible;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .reward-item-img {
      width: 130px;
      height: 130px;
      object-fit: contain;
      transform: rotate(-6deg) translate(8px, 4px);
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.5));
      transition: transform 0.2s ease;
    }

    .card,
    .hero-card,
    .cart-item,
    .sheet {
      padding: 16px;
    }

    .hero-card {
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.22), transparent 26%),
        linear-gradient(135deg, rgba(30, 8, 10, 0.98), rgba(15, 14, 14, 0.96));
    }

    html[data-theme="light"] .card,
    html[data-theme="light"] .product-card,
    html[data-theme="light"] .cart-item,
    html[data-theme="light"] .sheet {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 238, 230, 0.94));
    }

    html[data-theme="light"] .hero-card {
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.12), transparent 26%),
        linear-gradient(135deg, rgba(255, 249, 243, 0.98), rgba(248, 238, 231, 0.98));
    }

    .kicker {
      color: rgba(255, 255, 255, 0.72);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: var(--font-body);
    }

    .hero-card h3 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 34px;
      line-height: 0.92;
      letter-spacing: 0.01em;
      font-style: italic;
      font-weight: 800;
      text-transform: uppercase;
    }

    .hero-card h3.hero-xl {
      font-size: 36px;
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .hero-card p,
    .card p,
    .meta,
    .store-address,
    .store-note,
    .helper,
    .cart-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-style: italic;
      font-weight: 800;
    }

    .product-card .meta,
    .product-card .helper,
    .search input::placeholder {
      font-family: var(--font-display);
      font-style: italic;
    }

    .rank-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 88px;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: var(--font-body);
      border: 1px solid transparent;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .rank-badge.rank-bronze {
      color: #ffd8ba;
      background: linear-gradient(135deg, rgba(110, 67, 44, 0.96), rgba(61, 35, 24, 0.96));
      border-color: rgba(255, 208, 177, 0.24);
    }

    .rank-badge.rank-silver {
      color: #f6f6f8;
      background: linear-gradient(135deg, rgba(137, 145, 161, 0.96), rgba(78, 84, 96, 0.96));
      border-color: rgba(241, 244, 255, 0.24);
    }

    .rank-badge.rank-gold {
      color: #221204;
      background: linear-gradient(135deg, rgba(255, 213, 107, 0.98), rgba(255, 166, 40, 0.98));
      border-color: rgba(255, 240, 194, 0.36);
    }

    .rank-badge.rank-platinum {
      color: #f8fbff;
      background: linear-gradient(135deg, rgba(145, 232, 255, 0.96), rgba(111, 147, 255, 0.96));
      border-color: rgba(234, 249, 255, 0.34);
    }

    .rank-meta {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 800;
    }

    .support-display {
      font-family: var(--font-display);
      font-size: 12px;
      line-height: 1.38;
      font-style: italic;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--muted);
    }

    .rank-card {
      position: relative;
      overflow: hidden;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top right, rgba(255, 213, 107, 0.22), transparent 26%),
        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(135deg, rgba(24, 20, 13, 0.98), rgba(12, 11, 12, 0.98));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .rank-card {
      border-color: rgba(66, 40, 30, 0.1);
      background:
        radial-gradient(circle at top right, rgba(255, 213, 107, 0.18), transparent 26%),
        radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.36), transparent 24%),
        linear-gradient(135deg, rgba(255, 250, 241, 0.98), rgba(247, 238, 228, 0.98));
    }

    .rank-card::after {
      content: "";
      position: absolute;
      inset: auto -20% -55% 40%;
      height: 180px;
      background: radial-gradient(circle, rgba(255, 209, 92, 0.2), transparent 64%);
      pointer-events: none;
    }

    .rank-card-top {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .rank-card-title {
      margin: 4px 0 0;
      font-family: var(--font-display);
      font-size: 34px;
      line-height: 0.92;
      letter-spacing: 0.01em;
      font-style: italic;
      text-transform: uppercase;
    }

    .rank-card-title.hero-xl {
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0;
    }

    .rank-progress {
      position: relative;
      z-index: 1;
      height: 12px;
      margin-top: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.28);
    }

    .rank-progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ffe191 0%, #ffbf5b 42%, #ff9a24 100%);
      box-shadow: 0 0 18px rgba(255, 191, 91, 0.42);
    }

    .rank-meter {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: var(--font-body);
      font-style: italic;
    }

    .perk-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .perk-card {
      padding: 10px 10px 11px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    html[data-theme="light"] .perk-card {
      border-color: rgba(66, 40, 30, 0.08);
      background: rgba(255, 255, 255, 0.68);
    }

    .perk-card strong {
      display: block;
      font-size: 10px;
      font-family: var(--font-body);
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.55;
    }

    .perk-card p {
      margin: 0;
      font-family: var(--font-body);
      font-style: italic;
      font-size: 12px;
      line-height: 1.35;
    }

    .context-strip {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    .promo-carousel {
      display: grid;
      gap: 10px;
    }

    .promo-rail {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      scroll-snap-type: x proximity;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .promo-rail::-webkit-scrollbar {
      display: none;
    }

    .promo-slide {
      position: relative;
      flex: 0 0 min(84%, 280px);
      min-height: 158px;
      padding: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid #3d1010;
      background: linear-gradient(145deg, #1e0808 0%, #2c1010 100%);
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .promo-slide-locked {
      opacity: 0.6;
      border-color: #2a2a2a !important;
      background: linear-gradient(145deg, #161616 0%, #1e1e1e 100%) !important;
      cursor: not-allowed;
    }

    .promo-slide-glow {
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      pointer-events: none;
    }

    html[data-theme="light"] .promo-slide {
      background: linear-gradient(145deg, rgba(255, 249, 243, 0.98), rgba(248, 238, 231, 0.98));
      border-color: rgba(228, 0, 43, 0.2);
    }

    .promo-slide-badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.1em;
      border-radius: 4px;
      padding: 2px 8px;
      display: inline-block;
      text-transform: uppercase;
      align-self: flex-start;
      border: 1px solid;
      font-family: var(--font-body);
      font-style: normal;
    }

    .promo-slide-locked .promo-slide-badge {
      color: #555 !important;
      border-color: #333 !important;
      background: transparent !important;
    }

    .promo-slide-main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 80px;
      gap: 12px;
      align-items: center;
      margin-top: 2px;
    }

    .promo-slide-media {
      justify-self: end;
      align-self: center;
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 0;
      pointer-events: none;
      filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.24));
    }

    .promo-slide-locked .promo-slide-media {
      filter: grayscale(1) drop-shadow(0 10px 20px rgba(0, 0, 0, 0.24));
    }

    .promo-slide-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .promo-slide-title {
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      color: var(--text);
      font-style: italic;
    }

    .promo-slide-locked .promo-slide-title {
      color: #444;
    }

    .promo-slide-subtitle {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-body);
      font-style: normal;
    }

    .promo-slide-locked .promo-slide-subtitle {
      color: #3a3a3a !important;
    }

    .promo-slide-copy {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
      font-style: italic;
      margin: 2px 0 0;
    }

    .promo-slide-locked .promo-slide-copy {
      color: #3a3a3a;
    }

    .promo-slide-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
      margin: 2px 0;
    }

    html[data-theme="light"] .promo-slide-divider {
      background: rgba(66, 40, 30, 0.1);
    }

    .promo-slide-action {
      margin-top: 0;
      width: 100%;
      min-height: 34px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      border: none;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      position: relative;
      z-index: 1;
      font-family: var(--font-body);
      font-style: normal;
      cursor: pointer;
      transition: filter 0.15s ease;
    }

    .promo-slide-action:disabled {
      cursor: not-allowed;
    }

    .promo-slide-claimed-check {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #2d7a2d;
      border: 2px solid #4CAF50;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #4CAF50;
      z-index: 2;
    }

    html[data-theme="light"] .context-strip,
    html[data-theme="light"] .store-row,
    html[data-theme="light"] .product-visual {
      background: rgba(92, 63, 50, 0.04);
    }

    .context-strip strong,
    .section-head strong,
    .price,
    .total {
      display: block;
      font-weight: 700;
    }

    .context-strip strong {
      font-family: var(--font-body);
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-head h4 {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      font-family: var(--font-body);
      font-style: italic;
      text-transform: uppercase;
    }

    .section-tag {
      color: #ff9eb1;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      font-family: var(--font-body);
      font-style: italic;
    }

    .choice-grid,
    .slot-grid,
    .store-list,
    .menu-grid,
    .cart-list {
      display: grid;
      gap: 10px;
    }

    .choice-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .slot-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 10px;
    }

    .pill {
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
      font-family: var(--font-body);
      font-style: italic;
    }

    .pill small {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 800;
      font-family: var(--font-body);
      font-style: italic;
    }

    .pill.active {
      background: linear-gradient(180deg, rgba(228, 0, 43, 0.96), rgba(182, 0, 35, 0.96));
      color: white;
    }

    .pill.active small {
      color: rgba(255, 255, 255, 0.74);
    }

    .pill.disabled {
      opacity: 0.34;
      cursor: not-allowed;
    }

    .store-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s var(--ease), background 0.15s var(--ease), transform 0.15s var(--ease);
    }

    .store-row.active {
      border-color: rgba(228, 0, 43, 0.6);
      background: rgba(228, 0, 43, 0.12);
    }

    .store-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      font-size: 22px;
    }

    .store-name {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 3px;
      font-family: var(--font-body);
      font-style: italic;
      text-transform: uppercase;
    }

    .store-note {
      font-family: var(--font-body);
      font-style: italic;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: rgba(255, 255, 255, 0.06);
      font-family: var(--font-body);
    }

    .badge.live {
      background: rgba(82, 216, 144, 0.14);
      color: var(--green);
    }

    .badge.warn {
      background: rgba(255, 191, 91, 0.14);
      color: var(--gold);
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 50px;
      padding: 0 14px 0 44px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
      font-family: var(--font-display);
      font-size: 13px;
      font-style: italic;
      font-weight: 800;
    }

    .search::before {
      content: "⌕";
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      pointer-events: none;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar {
      display: none;
    }

    .category-tabs {
      display: flex;
      align-items: flex-end;
      gap: 18px;
      overflow-x: auto;
      padding: 2px 0 6px;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .category-tabs {
      border-bottom-color: rgba(66, 40, 30, 0.1);
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      position: relative;
      min-height: auto;
      padding: 0 0 8px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      white-space: nowrap;
      font-family: var(--font-display);
      font-size: 19px;
      font-style: italic;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
      flex: 0 0 auto;
    }

    .category-tab::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: transparent;
      transform: scaleX(0);
      transform-origin: left center;
      transition: transform 0.18s var(--ease), background 0.18s var(--ease);
    }

    .category-tab.active {
      color: var(--red);
      background: transparent;
    }

    .category-tab.active::after {
      background: var(--red);
      transform: scaleX(1);
    }

    .menu-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .product-card {
      padding: 0;
      cursor: pointer;
      transition: transform 0.15s var(--ease), border-color 0.15s var(--ease);
      display: flex;
      flex-direction: column;
    }

    .product-card.unavailable {
      opacity: 0.48;
      cursor: default;
    }

    .product-visual {
      height: 118px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.18), transparent 25%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .product-visual img,
    .detail-emoji img,
    .cart-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .product-title {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.4;
      margin-bottom: 6px;
      font-family: var(--font-display);
      font-style: italic;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .product-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: auto;
      padding-top: 8px;
    }

    .product-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-btn {
      flex: 1;
      min-height: 34px;
      border-radius: 10px;
      border: 0;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 11px;
      font-family: var(--font-display);
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      font-style: italic;
    }

    .mini-btn.primary {
      flex: 0 0 34px;
      width: 34px;
      min-width: 34px;
      padding: 0;
      background: var(--red);
      color: white;
      font-size: 22px;
      line-height: 1;
      text-align: center;
    }

    .price {
      color: var(--gold);
      font-size: 14px;
      font-family: var(--font-display);
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .add-btn {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: 0;
      background: var(--red);
      color: white;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
    }

    .unavailable-note {
      margin-top: 8px;
      color: rgba(255, 255, 255, 0.54);
      font-size: 10px;
      line-height: 1.45;
    }

    .detail-hero {
      display: grid;
      grid-template-columns: 146px 1fr;
      gap: 18px;
      align-items: center;
    }

    .detail-emoji {
      width: 146px;
      height: 146px;
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.24), transparent 24%),
        rgba(255, 255, 255, 0.05);
      cursor: zoom-in;
      outline: none;
    }

    .detail-emoji img {
      transform: scale(1.12);
      transform-origin: center center;
      transition: transform 0.22s var(--ease);
      will-change: transform;
    }

    .detail-emoji:hover img,
    .detail-emoji:active img,
    .detail-emoji:focus img {
      transform: scale(1.34);
    }

    .detail-name {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 900;
      font-family: var(--font-display);
      font-style: italic;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .option-group {
      display: grid;
      gap: 8px;
    }

    .option-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff9eb1;
      font-weight: 800;
      font-family: var(--font-body);
      font-style: italic;
    }

    .detail-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 72px;
      z-index: 10;
      padding: 14px 18px 18px;
      background:
        linear-gradient(180deg, rgba(11, 11, 11, 0), rgba(11, 11, 11, 0.96) 20%, rgba(11, 11, 11, 1) 100%);
      display: grid;
      gap: 12px;
    }

    .detail-footer[hidden] {
      display: none !important;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .qty-value {
      min-width: 20px;
      text-align: center;
      font-weight: 700;
      font-family: var(--font-display);
      font-style: italic;
    }

    .cta,
    .ghost-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 18px;
      font-weight: 600;
      font-size: 14px;
    }

    .cta {
      background: linear-gradient(180deg, #f1224f 0%, #d4002a 100%);
      color: white;
      box-shadow: 0 12px 30px rgba(228, 0, 43, 0.28);
      font-family: var(--font-display);
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .ghost-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: var(--font-body);
    }

    .cart-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .cart-art {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
    }

    .cart-title {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 4px;
      font-family: var(--font-display);
      font-style: italic;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .cart-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary {
      display: grid;
      gap: 10px;
    }

    .pay-summary {
      gap: 14px;
      padding: 14px 14px 16px;
      border-radius: 28px;
      border-color: rgba(255, 255, 255, 0.08);
      background: #020202;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .pay-summary::before {
      content: "";
      width: 52px;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      margin: 0 auto 8px;
      display: block;
    }

    .pay-summary .section-head {
      display: none;
    }

    .summary-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 800;
    }

    .summary-row span:first-child {
      color: var(--muted);
    }

    .pay-summary .summary-row {
      font-size: 17px;
      line-height: 1.2;
    }

    .pay-summary .summary-row span:first-child {
      color: rgba(255, 255, 255, 0.92);
    }

    .pay-summary .summary-row strong {
      font-family: var(--font-display);
      font-size: 22px;
      line-height: 0.9;
      font-style: italic;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      color: #ffffff;
      flex: 0 0 auto;
    }

    .pay-summary .summary-row--minor strong {
      font-size: 18px;
    }

    .pay-summary .summary-total {
      margin-top: 12px;
      padding-top: 14px;
    }

    .pay-summary .summary-total strong {
      font-size: 34px;
    }

    .total {
      color: var(--gold);
      font-size: 20px;
      font-family: var(--font-display);
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .pay-summary .total {
      color: #ffffff;
      font-size: 34px;
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: 0;
    }

    .pay-summary .cta {
      min-height: 42px;
      border-radius: 0;
      margin-top: 6px;
      box-shadow: none;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .checkout-field {
      display: grid;
      gap: 8px;
    }

    .coupon-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .coupon-row input {
      flex: 1;
      min-width: 0;
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      font-weight: 800;
      transition: border-color 0.15s;
    }

    .coupon-row input:focus {
      border-color: rgba(255, 255, 255, 0.22);
    }

    .coupon-row input.applied {
      border-color: rgba(82, 216, 144, 0.5);
      background: rgba(82, 216, 144, 0.06);
    }

    .coupon-row .apply-btn {
      flex: 0 0 auto;
      height: 48px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }

    .coupon-row .apply-btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .coupon-row .apply-btn.applied {
      border-color: rgba(82, 216, 144, 0.4);
      color: var(--green);
    }

    .coupon-or {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .coupon-or::before,
    .coupon-or::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .checkout-field input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
      font-family: var(--font-body);
      font-size: 13px;
      font-style: italic;
      font-weight: 800;
    }

    .tracking {
      display: grid;
      gap: 12px;
    }

    .track-line {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .track-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .track-dot.done {
      background: var(--green);
    }

    .track-dot.current {
      background: var(--red);
      box-shadow: 0 0 0 8px rgba(228, 0, 43, 0.12);
    }

    .track-bar {
      height: 2px;
      background: rgba(255, 255, 255, 0.16);
    }

    .track-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-body);
      font-style: italic;
      font-weight: 800;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 60;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 2px;
      padding: 10px 10px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: #000000;
      backdrop-filter: blur(20px);
    }

    html[data-theme="light"] .bottom-nav {
      background: #000000;
      border-top-color: rgba(66, 40, 30, 0.08);
    }

    .nav-btn {
      min-height: 66px;
      border-radius: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.15;
      padding: 2px 1px;
    }

    .nav-btn-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      min-width: 0;
    }

    .nav-btn-icon {
      position: relative;
      width: 28px;
      height: 28px;
      flex: 0 0 28px;
      display: grid;
      place-items: center;
      color: currentColor;
      overflow: visible;
    }

    .nav-btn-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .nav-btn-label {
      display: block;
      width: 100%;
      font-size: 9px;
      line-height: 1.1;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      font-family: var(--font-body);
      font-weight: 800;
      letter-spacing: 0.01em;
      text-transform: uppercase;
      font-style: italic;
    }

    .nav-btn.active {
      background: transparent;
      color: var(--red);
    }

    .nav-btn.active .nav-btn-label {
      color: var(--red);
    }

    .nav-btn:not(.active) .nav-btn-label {
      color: #ffffff;
    }

    .toast {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 120px;
      z-index: 24;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(24, 24, 24, 0.94);
      border: 1px solid var(--line);
      color: white;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    html[data-theme="light"] .toast {
      background: rgba(255, 249, 243, 0.96);
      border-color: rgba(66, 40, 30, 0.1);
      color: var(--text);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .empty {
      padding: 36px 20px;
      border-radius: var(--radius-lg);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .stage.fullscreen-mode {
      padding: 0;
    }

    .stage.fullscreen-mode .phone-wrap {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      max-width: none;
      max-height: none;
      border-radius: 0;
      padding: 0;
    }

    .stage.fullscreen-mode .phone-wrap::before {
      display: none;
    }

    .stage.fullscreen-mode .phone {
      border-radius: 0;
    }

    @media (max-width: 440px) {
      html, body {
        min-height: 100vh;
        min-height: 100dvh;
      }

      .stage {
        min-height: 100vh;
        min-height: 100dvh;
        padding: 0;
      }

      .phone-wrap {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        border-radius: 0;
        padding: 0;
      }

      .phone {
        border-radius: 0;
      }
    }

    @media (max-width: 390px), (max-height: 760px) {
      .status-bar {
        padding: 14px 18px 0;
        height: 46px;
        font-size: 12px;
      }

      .topbar {
        padding: 80px 14px 10px;
      }

      .topbar.journey-mode {
        grid-template-columns: 1fr auto;
        column-gap: 12px;
      }

      .topbar.journey-mode .topbar-left {
        min-height: 56px;
      }

      .journey-shell-bar {
        margin-top: 0;
        padding: 0;
      }

      .journey-shell-meta {
        gap: 14px;
        padding: 12px 14px;
      }

      .journey-shell-chip {
        font-size: 11px;
      }

      .toolbar {
        top: 38px;
        gap: 6px;
      }

      .stage.shell-browser .toolbar {
        top: 10px;
        right: 12px;
      }

      .web-nav {
        padding: 12px 14px;
        align-items: flex-start;
        flex-direction: column;
      }

      .web-nav-actions {
        width: 100%;
        margin-left: 0;
        justify-content: space-between;
      }

      .web-links {
        width: 100%;
        justify-content: flex-start;
      }
      .nav-cluster,
      .locale-switch,
      .view-switch {
        gap: 4px;
        padding: 3px;
      }

      .icon-btn,
      .toggle-btn {
        min-width: 34px;
        height: 30px;
        font-size: 11px;
      }

      .toggle-btn,
      .view-btn {
        padding: 0 10px;
      }

      .screen-title {
        font-size: 30px;
      }

      .topbar.compact .screen-title {
        font-size: 19px;
      }

      .screen-subtitle {
        font-size: 11px;
        max-width: 190px;
      }

      .content {
        padding: 14px 14px 92px;
      }

      .card,
      .hero-card,
      .cart-item,
      .sheet {
        padding: 14px;
      }

      .promo-banner {
        min-height: 150px;
      }

      .product-visual {
        height: 96px;
      }

      .detail-hero {
        grid-template-columns: 96px 1fr;
        gap: 14px;
      }

      .detail-emoji {
        width: 96px;
        height: 96px;
        border-radius: 22px;
      }

      .bottom-nav {
        gap: 2px;
        bottom: 0;
        padding: 8px 6px 0;
      }

      .nav-btn {
        min-height: 60px;
        font-size: 9px;
        padding: 2px 1px;
      }

      .nav-btn-inner {
        gap: 6px;
      }

      .nav-btn-icon {
        width: 24px;
        height: 24px;
        flex-basis: 24px;
      }

      .nav-btn-label {
        font-size: 8px;
        line-height: 1.05;
      }

      .detail-footer {
        bottom: 60px;
        padding: 12px 14px 14px;
      }

      .toast {
        left: 14px;
        right: 14px;
        bottom: 102px;
      }
    }

    /* ─── Action Sheet ──────────────────────────────────────────── */
    .action-sheet-overlay {
      position: absolute;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      overflow: hidden;
      border-radius: inherit;
    }

    .action-sheet-overlay[hidden] {
      display: none;
    }

    .action-sheet-scrim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.52);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .action-sheet-panel {
      position: relative;
      background: var(--panel);
      border-top: 1px solid var(--line);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 8px 18px 40px;
      max-height: 72%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      animation: sheetIn 0.26s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    @keyframes sheetIn {
      from { transform: translateY(100%); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .action-sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.14);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    html[data-theme="light"] .action-sheet-handle {
      background: rgba(0, 0, 0, 0.12);
    }

    html[data-theme="light"] .action-sheet-scrim {
      background: rgba(0, 0, 0, 0.32);
    }

    .action-sheet-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: var(--muted);
      margin: 0 0 14px;
    }

    .action-sheet-section {
      margin-top: 18px;
    }

    .action-sheet-section:first-of-type {
      margin-top: 0;
    }
    /* ─── Nutrition Modal ──────────────────────────────────────── */
    .nutrition-scrim {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 48;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease;
    }

    .nutrition-scrim.open {
      opacity: 1;
      pointer-events: all;
    }

    .nutrition-modal {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 87%;
      background: var(--panel);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      z-index: 49;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.32s var(--ease);
      overflow: hidden;
      border-top: 1px solid var(--line);
    }

    html[data-theme="light"] .nutrition-modal {
      background: var(--panel);
      border-top-color: rgba(66, 40, 30, 0.1);
    }

    .nutrition-modal.open {
      transform: translateY(0);
    }

    .nutrition-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    html[data-theme="light"] .nutrition-handle {
      background: rgba(66, 40, 30, 0.18);
    }

    .nutrition-modal-head {
      padding: 14px 18px 0;
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .nutrition-modal-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
    }

    .nutrition-modal-kj {
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-body);
      font-style: normal;
    }

    .nutrition-close-btn {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--font-body);
      margin-top: 2px;

      padding: 12px 18px 0;
      flex-shrink: 0;
      border-bottom: 1px solid var(--line);
      gap: 0;

      flex: 1;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 800;
      font-style: normal;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .nutrition-tab.active {
      color: var(--text);
      border-bottom-color: var(--red);
    }

    .nutrition-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px 24px;
      scrollbar-width: none;
    }

    .nutrition-modal-body::-webkit-scrollbar { display: none; }

    /* Nutrition table */
    .nutrition-table {
      width: 100%;
      border-collapse: collapse;
    }

    .nutrition-table thead th {
      padding: 0 0 8px;
      color: var(--muted);
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 800;
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: right;
      border-bottom: 1px solid var(--line);
    }

    .nutrition-table thead th:first-child { text-align: left; }

    .nutrition-table tbody td {
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      color: var(--text);
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 700;
      font-size: 12px;
      text-align: right;
    }

    .nutrition-table tbody td:first-child {
      text-align: left;
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      padding-right: 12px;
    }

    .nutrition-table tbody tr.nt-highlight td {
      color: var(--text);
      font-weight: 900;
    }

    .nutrition-table tbody tr.nt-highlight td:first-child {
      color: var(--text);
      font-weight: 800;
    }

    .nutrition-table tbody tr.nt-sub td:first-child {
      padding-left: 14px;
    }

    /* Allergens */
    .allergen-legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 12px;
    }

    .allergen-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-body);
      font-style: normal;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .allergen-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .allergen-dot.present { background: var(--red); }
    .allergen-dot.na { background: rgba(255, 255, 255, 0.14); }

    html[data-theme="light"] .allergen-dot.na { background: rgba(66, 40, 30, 0.14); }

    .allergen-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      gap: 12px;
    }

    .allergen-name {
      font-size: 11px;
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 600;
      color: var(--muted);
      flex: 1;
      min-width: 0;
    }

    .allergen-status {
      font-size: 9px;
      font-family: var(--font-body);
      font-style: normal;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .allergen-status.present {
      background: rgba(228, 0, 43, 0.16);
      color: #ff7b8f;
    }

    .allergen-status.na {
      color: rgba(255, 255, 255, 0.2);
      padding: 3px 0;

      color: rgba(66, 40, 30, 0.2);

      font-weight: 600;

      text-transform: uppercase;
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      opacity: 0.7;
    }

    .nutrition-link-btn:hover { opacity: 1; }

    .login-screen {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding: 0 24px 40px;

    .login-hero {
      flex: 1;

      align-items: center;

      gap: 0;

      margin-bottom: 20px;
    }

    .login-heading {
      margin: 0;

      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      line-height: 0.9;
      text-align: center;
    }

    .login-sub {
      margin: 12px 0 0;

      font-size: 12px;
      font-style: normal;
      font-weight: 600;
      line-height: 1.55;
      text-align: center;
      max-width: 220px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-field-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .login-label {
      font-size: 10px;
      font-weight: 800;
      font-style: normal;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .login-input {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border-radius: 16px;
      border: 1.5px solid var(--line);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      font-style: normal;
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.15s var(--ease);
    }

      background: rgba(0, 0, 0, 0.04);
    }

    .login-input:focus {
      border-color: rgba(255, 255, 255, 0.3);
    }

    html[data-theme="light"] .login-input:focus {
      border-color: rgba(35, 24, 21, 0.3);

    .login-input.error {
      border-color: var(--red);
    }

          commit(() => {

            state.confirmedAddress = "";

          state.timing = next;
          if (next === "asap") {
            render();
            closeSheet();
          } else {
            // Stay open, re-render sheet to show date/slot pickers
            actionSheetPanel.innerHTML = renderSheetContent("time");
            attachSheetEvents();

        });

      actionSheetPanel.querySelectorAll("[data-sheet-date]").forEach((el) => {

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function snapshot() {
      return clone(state);
    }

    function restore(next) {
      Object.assign(state, clone(next));
      render();
    }

    function commit(mutator) {
      historyStack.push(snapshot());
      futureStack.length = 0;
      mutator();
      render();
    }

    function goBack() {
      if (!historyStack.length) return;
      futureStack.unshift(snapshot());
      restore(historyStack.pop());
    }

    function goForward() {
      if (!futureStack.length) return;
      historyStack.push(snapshot());
      restore(futureStack.shift());
    }

    function setLocale(locale) {
      state.locale = locale;
      render();
    }

    function navigate(screen) {
      if (requiresAuth(screen) && !state.isSignedIn) {
        screen = "login";
      }
      if (screen === "menu") {
        if (state.mode === "delivery" && !state.confirmedAddress && (state.selectedAddressId || state.deliveryAddressInput.trim())) {
          resolveDeliverySetup();
        }
        state.browseOnlyMenu = !(state.mode === "delivery" ? state.confirmedAddress : (state.hasChosenStore && state.storeId));
      }
      if (state.screen === screen) {
        render();
        return;
      }
      commit(() => {
        state.screen = screen;
      });
    }

      if (state.browseOnlyMenu) {

        if (state.timing !== "schedule" && product.id === "breakfast") return false;
        if (state.mode === "pickup" && state.storeId === "airport" && product.id === "feast") return false;
        if (state.mode === "pickup" && state.storeId === "westside" && product.id === "twister") return false;
        return true;

    function filteredAddressSuggestions() {
      const query = state.deliveryAddressInput.trim().toLowerCase();
      if (!query) return addressSuggestions;
      return addressSuggestions.filter((item) => {
        const label = item.label[state.locale].toLowerCase();
        const address = item.address[state.locale].toLowerCase();
        return label.includes(query) || address.includes(query);

      const typedAddress = state.deliveryAddressInput.trim();
      const suggestion = addressSuggestions.find((item) => item.id === state.selectedAddressId) || addressSuggestions[0];
      const resolvedAddress = state.confirmedAddress || typedAddress || suggestion.address[state.locale];
      state.selectedAddressId = state.selectedAddressId || suggestion.id;
      state.confirmedAddress = resolvedAddress;
      state.storeId = state.storeId || suggestion.storeId;
      state.hasChosenStore = false;
      state.checkout.address1 = resolvedAddress;
      state.checkout.address2 = state.checkout.address2 || "Los Angeles, CA";

    function getLoyaltyStatus() {
      const tiers = [
        { key: "bronze", label: "Bronze", floor: 0 },
        { key: "silver", label: "Silver", floor: 1200 },
        { key: "gold", label: "Gold", floor: 2400 },
        { key: "platinum", label: "Platinum", floor: 4000 }
      ];
      const points = 2840;
      const current = tiers.find((tier) => tier.key === "gold");
      const next = tiers[tiers.indexOf(current) + 1] || current;
      const currentFloor = current.floor;
      const nextFloor = next.floor;
      const span = Math.max(1, nextFloor - currentFloor);
      const progress = Math.min(100, Math.max(0, ((points - currentFloor) / span) * 100));

      return {
        points,
        current,
        next,
        progress,
        pointsToNext: Math.max(0, nextFloor - points)
      };
    }

      els.previewBadge.textContent = t().previewBadge;

      els.title.classList.toggle("screen-title-logo", useLogoTitle);

        els.title.innerHTML = '<button class="screen-title-logo-link" type="button" data-nav="home" aria-label="Home"><img class="screen-title-logo-image" src="https://images.ctfassets.net/wtodlh47qxpt/30HPXFOIOQLBBfuwplbndu/992a3b2157906181dc39be71202f4f3f/kfc_logo_icon.svg" alt="KFC logo"></button>';
      } else {
        els.title.textContent = screenCopy.title;
      }
      els.title.classList.toggle("hero-xl", state.screen === "rewards");
      els.subtitle.textContent = showJourneyShell ? "" : screenCopy.subtitle;
      const topbar = document.querySelector(".topbar");
      topbar.classList.toggle("compact", state.screen === "menu");
      topbar.classList.toggle("journey-mode", showJourneyShell);
      els.back.disabled = historyStack.length === 0;
      els.forward.disabled = futureStack.length === 0;
      els.fullscreenBtn.textContent = (document.fullscreenElement || embeddedFullscreenMode) ? "Exit Fullscreen" : "Fullscreen";

    function attachEvents() {
      document.querySelectorAll("[data-store]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.storeId = el.dataset.store;
            state.hasChosenStore = true;
            state.confirmedAddress = "";
            state.selectedAddressId = null;
            state.deliveryAddressInput = "";
            state.browseOnlyMenu = false;
          });
        });
      });

      document.querySelectorAll("[data-mode]").forEach((el) => {
        el.addEventListener("click", () => {
          if (el.disabled) return;
          if (state.mode !== el.dataset.mode && (state.hasChosenStore || state.confirmedAddress)) {
            const shouldSwitch = window.confirm(t().labels.switchModeWarning);
            if (!shouldSwitch) return;
          }
          commit(() => {
            state.mode = el.dataset.mode;
            state.storeId = null;
            state.hasChosenStore = false;
            state.confirmedAddress = "";
            state.selectedAddressId = null;
            state.deliveryAddressInput = "";
            state.browseOnlyMenu = false;
          });
        });
      });

      document.querySelectorAll("[data-timing]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.timing = el.dataset.timing;
          });
        });
      });

      document.querySelectorAll("[data-slot]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.slot = el.dataset.slot;
          });
        });
      });

      document.querySelectorAll("[data-date]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.scheduleDate = el.dataset.date;
          });
        });
      });

      document.querySelectorAll("[data-nav]").forEach((el) => {
        el.addEventListener("click", () => navigate(el.dataset.nav));
      });

      document.querySelectorAll("[data-action='go-back']").forEach((el) => {
        el.addEventListener("click", () => goBack());
      });

      document.querySelectorAll("[data-action='sign-out']").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.isSignedIn = false;
            state.screen = "login";
          });
        });
      });

      document.querySelectorAll("[data-action='login-submit']").forEach((el) => {
        el.addEventListener("click", () => {
          const passwordInput = document.getElementById("login-password");
          const errorMsg = document.getElementById("login-error");
          const password = passwordInput ? passwordInput.value : "";
          if (password === "jyp4013") {
            commit(() => {
              state.isSignedIn = true;
              state.screen = "account";
            });
          } else {
            if (errorMsg) errorMsg.classList.add("visible");
            if (passwordInput) passwordInput.classList.add("error");
          }
        });
      });

      document.querySelectorAll("[data-category]").forEach((el) => {
        el.addEventListener("click", () => {
          state.category = el.dataset.category;
          render();
        });
      });

      document.querySelectorAll("[data-detail]").forEach((el) => {
        el.addEventListener("click", (event) => {
          if (event.target.closest("[data-quick-add]") || event.target.closest("[data-detail-cta]")) return;
          commit(() => {
            state.selectedProductId = el.dataset.detail;
            state.detailQty = 1;
            state.screen = "detail";
          });
        });
      });

      document.querySelectorAll("[data-detail-cta]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.selectedProductId = el.dataset.detailCta;
            state.detailQty = 1;
            state.screen = "detail";
          });
        });
      });

      document.querySelectorAll("[data-quick-add]").forEach((el) => {
        el.addEventListener("click", (event) => {
          event.stopPropagation();
          quickAdd(el.dataset.quickAdd);
        });
      });

      document.querySelectorAll("[data-option]").forEach((el) => {
        el.addEventListener("click", () => {
          const product = getProduct(state.selectedProductId);
          const options = getSelectedOptions(product);
          const type = el.dataset.option;
          const value = el.dataset.value;
          if (type === "extras") {
            const exists = options.extras.includes(value);
            options.extras = exists ? options.extras.filter((item) => item !== value) : [...options.extras, value];
          } else {
            options[type] = value;
          }
          render();
        });
      });

      document.querySelectorAll("[data-qty]").forEach((el) => {
        el.addEventListener("click", () => {
          const change = Number(el.dataset.qty);
          state.detailQty = Math.max(1, state.detailQty + change);
          render();
        });
      });

      document.querySelectorAll("[data-cart-qty]").forEach((el) => {
        el.addEventListener("click", () => {
          const key = el.dataset.cartQty;
          const change = Number(el.dataset.change);
          commit(() => {
            state.cart = state.cart
              .map((item) => item.key === key ? { ...item, qty: item.qty + change } : item)
              .filter((item) => item.qty > 0);
          });
        });
      });

      document.querySelectorAll("[data-payment]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.checkout.payment = el.dataset.payment;
          });
        });
      });

      document.querySelectorAll("[data-checkout-toggle]").forEach((el) => {
        el.addEventListener("click", () => {
          const key = el.dataset.checkoutToggle;

            state.checkout[key] = !state.checkout[key];
          });
        });

      document.querySelectorAll("[data-action='to-home']").forEach((el) => {
