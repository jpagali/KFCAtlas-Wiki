<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RNA Ordering Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --panel: #121212;
      --panel-2: #1b1b1b;
      --panel-3: #252525;
      --line: rgba(255, 255, 255, 0.08);
      --text: #fff8f1;
      --muted: rgba(255, 248, 241, 0.64);
      --red: #e4002b;
      --red-soft: rgba(228, 0, 43, 0.18);
      --gold: #ffbf5b;
      --green: #52d890;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: "Bebas Neue", sans-serif;
      --font-body: "Space Grotesk", sans-serif;
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    html[data-theme="light"] {
      --bg: #f6efe8;
      --panel: #fff9f3;
      --panel-2: #f4ece4;
      --panel-3: #ede2d8;
      --line: rgba(66, 40, 30, 0.1);
      --text: #231815;
      --muted: rgba(35, 24, 21, 0.64);
      --red-soft: rgba(228, 0, 43, 0.08);
      --shadow: 0 24px 60px rgba(71, 47, 36, 0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.14), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.1), transparent 20%),
        #050505;
      font-family: var(--font-body);
      color: var(--text);
    }

    html[data-theme="light"] body {
      background:
        radial-gradient(circle at top left, rgba(228, 0, 43, 0.08), transparent 22%),
        radial-gradient(circle at bottom right, rgba(255, 191, 91, 0.08), transparent 20%),
        #f7f0e8;
    }

    button, input {
      font: inherit;
    }

    .stage {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(8px, 2vw, 24px);
    }

    .phone-wrap {
      position: relative;
      width: min(390px, calc(100vw - 16px));
      height: min(844px, calc(100vh - 16px));
      aspect-ratio: 390 / 844;
      border-radius: 54px;
      padding: 12px;
      background: linear-gradient(180deg, #1f1f1f 0%, #0d0d0d 100%);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .phone-wrap {
      background: linear-gradient(180deg, #efe5dc 0%, #d9cec3 100%);
      border-color: rgba(66, 40, 30, 0.12);
    }

    .phone-wrap::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 124px;
      height: 30px;
      border-radius: 999px;
      background: #050505;
      z-index: 30;
    }

    html[data-theme="light"] .phone-wrap::before {
      background: #dad0c7;
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 42px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 18%),
        #0b0b0b;
    }

    html[data-theme="light"] .phone {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.55), transparent 18%),
        #fff9f3;
    }

    .ambient {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 85% 18%, rgba(228, 0, 43, 0.18), transparent 22%),
        radial-gradient(circle at 18% 78%, rgba(255, 191, 91, 0.08), transparent 24%);
      opacity: 0.9;
    }

    html[data-theme="light"] .ambient {
      background:
        radial-gradient(circle at 85% 18%, rgba(228, 0, 43, 0.1), transparent 22%),
        radial-gradient(circle at 18% 78%, rgba(255, 191, 91, 0.08), transparent 24%);
    }

    .status-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 25;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 0;
      height: 52px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 13px;
      font-weight: 700;
    }

    html[data-theme="light"] .status-bar {
      color: rgba(35, 24, 21, 0.86);
    }

    .viewport {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 58px 18px 12px;
      display: block;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.84);
      backdrop-filter: blur(18px);
      position: relative;
    }

    html[data-theme="light"] .topbar {
      border-bottom-color: rgba(66, 40, 30, 0.08);
      background: rgba(255, 249, 243, 0.92);
    }

    .topbar-left {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.05);
      color: #ff9eb1;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 16px rgba(228, 0, 43, 0.45);
    }

    .screen-title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 38px;
      line-height: 0.94;
      letter-spacing: 0.03em;
    }

    .screen-title.screen-title-logo {
      display: flex;
      align-items: center;
      min-height: 45px;
      letter-spacing: 0;
    }

    .screen-title-logo-image {
      display: block;
      width: 74px;
      max-width: min(20vw, 74px);
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.24));
    }

    .topbar.compact .screen-title {
      font-size: 22px;
      line-height: 1;
    }

    .screen-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      max-width: 210px;
    }

    .topbar.compact .screen-subtitle {
      display: none;
    }

    .toolbar {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      gap: 8px;
      align-items: center;
      z-index: 28;
    }

    .nav-cluster,
    .locale-switch,
    .view-switch {
      display: flex;
      gap: 6px;
      justify-content: center;
      padding: 4px;
      border-radius: 999px;
      background: rgba(22, 22, 22, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
    }

    html[data-theme="light"] .nav-cluster,
    html[data-theme="light"] .locale-switch,
    html[data-theme="light"] .view-switch {
      background: rgba(255, 249, 243, 0.98);
      border-color: rgba(66, 40, 30, 0.1);
      box-shadow: 0 10px 24px rgba(71, 47, 36, 0.12);
    }

    .icon-btn,
    .toggle-btn,
    .pill,
    .nav-btn,
    .cta,
    .ghost-btn,
    .qty-btn {
      border: 0;
      cursor: pointer;
      transition: transform 0.15s var(--ease), background 0.15s var(--ease), opacity 0.15s var(--ease);
    }

    .icon-btn,
    .toggle-btn,
    .pill,
    .ghost-btn,
    .qty-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .icon-btn,
    .toggle-btn {
      min-width: 38px;
      height: 34px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .toggle-btn {
      padding: 0 14px;
      min-width: auto;
    }

    .view-btn {
      min-width: auto;
      padding: 0 14px;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .mini-hero-card {
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.16), transparent 30%),
        linear-gradient(135deg, rgba(30, 8, 10, 0.9), rgba(15, 14, 14, 0.92));
    }

    html[data-theme="light"] .mini-hero-card {
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.08), transparent 30%),
        linear-gradient(135deg, rgba(255, 249, 243, 0.98), rgba(248, 238, 231, 0.98));
    }

    .mini-hero-card h4 {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 700;
    }

    .mini-hero-card p {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .promo-banner {
      position: relative;
      overflow: hidden;
      min-height: 184px;
      border-radius: var(--radius-lg);
      border: 0;
      background:
        linear-gradient(180deg, rgba(8, 8, 8, 0.08), rgba(8, 8, 8, 0.55)),
        url("https://images.ctfassets.net/a2mgcrjjefyo/5VacEuaF9u5SJ5bOx5bsd9/5922fe00c43d0d18120d50006576b2ac/Web_750x1040_EN.png?w=430&fm=webp") center/cover no-repeat;
      box-shadow: inset 0 0 0 1px rgba(94, 43, 24, 0.9);
      display: flex;
      align-items: flex-end;
      padding: 16px;
    }

    .promo-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(8, 8, 8, 0.04), rgba(8, 8, 8, 0.82));
    }

    .promo-banner-body {
      position: relative;
      z-index: 1;
      max-width: 78%;
    }

    .promo-banner h3 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.05;
      font-weight: 700;
    }

    .promo-banner p {
      margin: 0;
      color: rgba(255, 248, 241, 0.84);
      font-size: 12px;
      line-height: 1.45;
    }

    .mode-warning {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 191, 91, 0.12);
      border: 1px solid rgba(255, 191, 91, 0.2);
      color: var(--gold);
      font-size: 11px;
      line-height: 1.45;
    }

    .map-card {
      position: relative;
      min-height: 190px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(244, 112, 137, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
        #101010;
    }

    html[data-theme="light"] .map-card {
      background:
        linear-gradient(135deg, rgba(244, 112, 137, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 238, 230, 0.94));
    }

    .map-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 34px 34px;
      opacity: 0.36;
    }

    html[data-theme="light"] .map-grid {
      background-image:
        linear-gradient(rgba(66, 40, 30, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(66, 40, 30, 0.08) 1px, transparent 1px);
    }

    .map-route {
      position: absolute;
      left: 18%;
      top: 25%;
      width: 56%;
      height: 46%;
      border: 3px solid rgba(228, 0, 43, 0.4);
      border-color: transparent transparent rgba(228, 0, 43, 0.68) rgba(228, 0, 43, 0.68);
      border-radius: 50px 0 80px 50px;
      transform: rotate(-8deg);
    }

    .map-pin,
    .map-store-badge,
    .map-rider {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      background: rgba(18, 18, 18, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    html[data-theme="light"] .map-pin,
    html[data-theme="light"] .map-store-badge,
    html[data-theme="light"] .map-rider {
      background: rgba(255, 249, 243, 0.96);
      border-color: rgba(66, 40, 30, 0.1);
    }

    .map-pin {
      right: 18px;
      bottom: 18px;
    }

    .map-store-badge {
      left: 16px;
      top: 16px;
      color: var(--green);
    }

    .map-rider {
      left: 42%;
      top: 48%;
      color: var(--gold);
    }

    .toggle-btn.active {
      background: var(--red);
    }

    .icon-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 18px 108px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 255, 255, 0.26) rgba(255, 255, 255, 0.06);
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.26);
      border-radius: 999px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.38);
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .card,
    .hero-card,
    .product-card,
    .cart-item,
    .sheet {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    .card,
    .hero-card,
    .cart-item,
    .sheet {
      padding: 16px;
    }

    .hero-card {
      padding: 18px;
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.22), transparent 26%),
        linear-gradient(135deg, rgba(30, 8, 10, 0.98), rgba(15, 14, 14, 0.96));
    }

    html[data-theme="light"] .card,
    html[data-theme="light"] .product-card,
    html[data-theme="light"] .cart-item,
    html[data-theme="light"] .sheet {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(246, 238, 230, 0.94));
    }

    html[data-theme="light"] .hero-card {
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.12), transparent 26%),
        linear-gradient(135deg, rgba(255, 249, 243, 0.98), rgba(248, 238, 231, 0.98));
    }

    .kicker {
      color: rgba(255, 255, 255, 0.72);
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .hero-card h3 {
      margin: 0 0 8px;
      font-family: var(--font-display);
      font-size: 34px;
      line-height: 0.95;
      letter-spacing: 0.03em;
    }

    .hero-card p,
    .card p,
    .meta,
    .store-address,
    .store-note,
    .helper,
    .cart-meta {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .context-strip {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--line);
    }

    html[data-theme="light"] .context-strip,
    html[data-theme="light"] .store-row,
    html[data-theme="light"] .product-visual {
      background: rgba(92, 63, 50, 0.04);
    }

    .context-strip strong,
    .section-head strong,
    .price,
    .total {
      display: block;
      font-weight: 700;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .section-head h4 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .section-tag {
      color: #ff9eb1;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 700;
    }

    .choice-grid,
    .slot-grid,
    .store-list,
    .menu-grid,
    .cart-list {
      display: grid;
      gap: 10px;
    }

    .choice-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .slot-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 10px;
    }

    .pill {
      min-height: 48px;
      padding: 10px 12px;
      border-radius: 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
    }

    .pill small {
      display: block;
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
      font-weight: 600;
    }

    .pill.active {
      background: linear-gradient(180deg, rgba(228, 0, 43, 0.96), rgba(182, 0, 35, 0.96));
      color: white;
    }

    .pill.active small {
      color: rgba(255, 255, 255, 0.74);
    }

    .pill.disabled {
      opacity: 0.34;
      cursor: not-allowed;
    }

    .store-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s var(--ease), background 0.15s var(--ease), transform 0.15s var(--ease);
    }

    .store-row.active {
      border-color: rgba(228, 0, 43, 0.6);
      background: rgba(228, 0, 43, 0.12);
    }

    .store-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.08);
      font-size: 22px;
    }

    .store-name {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: rgba(255, 255, 255, 0.06);
    }

    .badge.live {
      background: rgba(82, 216, 144, 0.14);
      color: var(--green);
    }

    .badge.warn {
      background: rgba(255, 191, 91, 0.14);
      color: var(--gold);
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 50px;
      padding: 0 14px 0 44px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
    }

    .search::before {
      content: "⌕";
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      pointer-events: none;
    }

    .chip-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chip-row::-webkit-scrollbar {
      display: none;
    }

    .menu-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .product-card {
      padding: 0;
      cursor: pointer;
      transition: transform 0.15s var(--ease), border-color 0.15s var(--ease);
    }

    .product-card.unavailable {
      opacity: 0.48;
      cursor: default;
    }

    .product-visual {
      height: 118px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(228, 0, 43, 0.18), transparent 25%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .product-visual img,
    .detail-emoji img,
    .cart-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-body {
      padding: 12px;
    }

    .product-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .product-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 8px;
    }

    .product-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .mini-btn {
      flex: 1;
      min-height: 34px;
      border-radius: 10px;
      border: 0;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font-size: 11px;
      font-weight: 700;

      gap: 14px;
      align-items: center;
    }

    .detail-emoji {

      height: 88px;
      border-radius: 26px;
      overflow: hidden;
      background:

    .detail-name {
      margin: 0;
      font-size: 22px;
      line-height: 1.1;
      font-weight: 700;
    }

    .option-group {
      display: grid;
      gap: 8px;
    }

    .option-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ff9eb1;
      font-weight: 700;
    }

    .detail-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 72px;
      z-index: 10;
      padding: 14px 18px 18px;
      background:
        linear-gradient(180deg, rgba(11, 11, 11, 0), rgba(11, 11, 11, 0.96) 20%, rgba(11, 11, 11, 1) 100%);
      display: grid;
      gap: 12px;
    }

    .price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .qty {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .qty-value {
      min-width: 20px;
      text-align: center;
      font-weight: 700;
    }

    .cta,
    .ghost-btn {
      width: 100%;
      min-height: 52px;
      border-radius: 18px;
      font-weight: 700;
      font-size: 14px;
    }

    .cta {
      background: linear-gradient(180deg, #f1224f 0%, #d4002a 100%);
      color: white;
      box-shadow: 0 12px 30px rgba(228, 0, 43, 0.28);
    }

    .ghost-btn {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .cart-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .cart-art {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
    }

    .cart-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cart-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary {
      display: grid;
      gap: 10px;
    }

    .summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
    }

    .summary-row span:first-child {
      color: var(--muted);
    }

    .total {
      color: var(--gold);
      font-size: 20px;
    }

    .checkout-field {
      display: grid;
      gap: 8px;
    }

    .checkout-field input {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      outline: none;
    }

    .tracking {
      display: grid;
      gap: 12px;
    }

    .track-line {
      display: grid;
      grid-template-columns: auto 1fr auto 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .track-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
    }

    .track-dot.done {
      background: var(--green);
    }

    .track-dot.current {
      background: var(--red);
      box-shadow: 0 0 0 8px rgba(228, 0, 43, 0.12);
    }

    .track-bar {
      height: 2px;
      background: rgba(255, 255, 255, 0.16);
    }

    .track-labels {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      font-size: 11px;
      color: var(--muted);
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 22;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      padding: 10px 10px 20px;
      border-top: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.92);
      backdrop-filter: blur(20px);
    }

    html[data-theme="light"] .bottom-nav {
      background: rgba(255, 248, 241, 0.94);
      border-top-color: rgba(66, 40, 30, 0.08);
    }

    .nav-btn {
      min-height: 44px;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.01em;
      text-align: center;
      line-height: 1.15;
      padding: 4px 2px;
    }

    .nav-btn span {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .nav-btn.active {
      background: rgba(228, 0, 43, 0.12);
      color: white;
    }

    .toast {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 94px;
      z-index: 24;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(24, 24, 24, 0.94);
      border: 1px solid var(--line);
      color: white;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    html[data-theme="light"] .toast {
      background: rgba(255, 249, 243, 0.96);
      border-color: rgba(66, 40, 30, 0.1);
      color: var(--text);
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .empty {
      padding: 36px 20px;
      border-radius: var(--radius-lg);
      border: 1px dashed rgba(255, 255, 255, 0.12);
      text-align: center;
      color: var(--muted);
      line-height: 1.6;
    }

    .stage.fullscreen-mode {
      padding: 0;
    }

    .stage.fullscreen-mode .phone-wrap {
      width: 100vw;
      height: 100vh;
      max-width: none;
      max-height: none;
      border-radius: 0;
      padding: 0;
    }

    .stage.fullscreen-mode .phone-wrap::before {
      display: none;
    }

    .stage.fullscreen-mode .phone {
      border-radius: 0;
    }

    @media (max-width: 440px) {
      html, body {
        min-height: 100vh;
      }

      .stage {
        min-height: 100vh;
        padding: 0;
      }

      .phone-wrap {
        width: 100vw;
        height: 100vh;
        border-radius: 0;
        padding: 0;
      }

      .phone {
        border-radius: 0;
      }
    }

    @media (max-width: 390px), (max-height: 760px) {
      .status-bar {
        padding: 14px 18px 0;
        height: 46px;
        font-size: 12px;
      }

      .topbar {
        padding: 52px 14px 10px;
      }

      .toolbar {
        top: 38px;
        gap: 6px;
      }

      .nav-cluster,
      .locale-switch,
      .view-switch {
        gap: 4px;
        padding: 3px;
      }

      .icon-btn,
      .toggle-btn {
        min-width: 34px;
        height: 30px;
        font-size: 11px;
      }

      .toggle-btn,
      .view-btn {
        padding: 0 10px;
      }

      .screen-title {
        font-size: 30px;
      }

      .topbar.compact .screen-title {
        font-size: 19px;
      }

      .screen-subtitle {
        font-size: 11px;
        max-width: 190px;
      }

      .content {
        padding: 14px 14px 92px;
      }

      .card,
      .hero-card,
      .cart-item,
      .sheet {
        padding: 14px;
      }

      .promo-banner {
        min-height: 150px;
      }

      .product-visual {
        height: 96px;
      }

      .detail-hero {
        grid-template-columns: 72px 1fr;
        gap: 12px;
      }

      .detail-emoji {
        width: 72px;
        height: 72px;
        border-radius: 20px;
      }

      .bottom-nav {
        gap: 2px;
        padding: 8px 6px 14px;
      }

      .nav-btn {
        min-height: 40px;
        font-size: 9px;
        padding: 3px 1px;
      }

      .nav-btn span {
        font-size: 12px;
        margin-bottom: 1px;
      }

      .detail-footer {
        bottom: 60px;
        padding: 12px 14px 14px;
      }

      .toast {
        left: 14px;
        right: 14px;
        bottom: 74px;
      }
    }

</head>

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function snapshot() {
      return clone(state);
    }

    function restore(next) {
      Object.assign(state, clone(next));
      render();
    }

    function commit(mutator) {
      historyStack.push(snapshot());
      futureStack.length = 0;
      mutator();
      render();
    }

    function goBack() {
      if (!historyStack.length) return;
      futureStack.unshift(snapshot());
      restore(historyStack.pop());
    }

    function goForward() {
      if (!futureStack.length) return;
      historyStack.push(snapshot());
      restore(futureStack.shift());
    }

    function setLocale(locale) {
      state.locale = locale;
      render();
    }

    function navigate(screen) {
      if (screen === "menu") {
        if (state.mode === "delivery" && !state.confirmedAddress && (state.selectedAddressId || state.deliveryAddressInput.trim())) {
          resolveDeliverySetup();
        }
        state.browseOnlyMenu = !(state.mode === "delivery" ? state.confirmedAddress : (state.hasChosenStore && state.storeId));
      }
      if (state.screen === screen) {
        render();
        return;
      }
      commit(() => {
        state.screen = screen;
      });
    }

        if (state.mode === "pickup" && state.storeId === "airport" && product.id === "feast") return false;
        if (state.mode === "pickup" && state.storeId === "westside" && product.id === "twister") return false;

        return label.includes(query) || address.includes(query);

          </div>
          `).join("")}
          <button class="cta" data-nav="menu">${t().labels.browseMenu}</button>
        </div>
      `;
    }

    function renderAccount() {
      els.detailFooter.hidden = true;
      return `
        <div class="stack">
          <div class="hero-card">
            <div class="kicker">${t().labels.accountTools}</div>
            <h3>Justin</h3>
            <p>${t().screens.account.subtitle}</p>
          </div>

          <div class="card">
            <div class="section-head"><h4>${t().labels.orderHistory}</h4><span class="section-tag">${t().labels.account}</span></div>
            <div class="context-strip">
              <div>
                <strong>Zinger Tower Burger Meal</strong>
                <div class="meta">Placed 2 days ago · ${getStore().name[state.locale]}</div>
              </div>
              <button class="ghost-btn" data-quick-add="zinger" style="width:auto;min-height:44px;padding:0 14px">${t().labels.reorder}</button>
            </div>
          </div>

          <div class="card">
            <div class="section-head"><h4>${t().labels.support}</h4><span class="section-tag">${t().labels.account}</span></div>
            <div class="product-actions">
              <button class="mini-btn">${t().labels.support}</button>
              <button class="mini-btn">${t().labels.giftCard}</button>
            </div>
          </div>

          <div class="card">
            <div class="section-head"><h4>${t().labels.aboutKfc}</h4><span class="section-tag">${t().labels.account}</span></div>
            <div class="product-actions">
              <button class="mini-btn">${t().labels.aboutKfc}</button>
              <button class="mini-btn">${t().labels.payment}</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderScreen() {
      switch (state.screen) {
        case "location":
          return renderLocation();
        case "deliveryLocation":
          return renderDeliveryLocation();
        case "deliveryMap":
          return renderDeliveryMap();
        case "store":
          return renderStore();
        case "home":
          return renderHome();
        case "menu":
          return renderMenu();
        case "detail":
          return renderDetail();
        case "cart":
          return renderCart();
        case "checkout":
          return renderCheckout();
        case "confirmation":
          return renderConfirmation();
        case "rewards":
          return renderRewards();
        case "account":
          return renderAccount();
        default:
          return renderHome();
      }
    }

    function attachEvents() {
      document.querySelectorAll("[data-store]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.storeId = el.dataset.store;
            state.hasChosenStore = true;
            state.confirmedAddress = "";
            state.selectedAddressId = null;
            state.deliveryAddressInput = "";
            state.browseOnlyMenu = false;
          });
        });
      });

      document.querySelectorAll("[data-mode]").forEach((el) => {
        el.addEventListener("click", () => {
          if (el.disabled) return;
          if (state.mode !== el.dataset.mode && (state.hasChosenStore || state.confirmedAddress)) {
            const shouldSwitch = window.confirm(t().labels.switchModeWarning);
            if (!shouldSwitch) return;
          }
          commit(() => {
            state.mode = el.dataset.mode;
            state.storeId = null;
            state.hasChosenStore = false;
            state.confirmedAddress = "";
            state.selectedAddressId = null;
            state.deliveryAddressInput = "";
            state.browseOnlyMenu = false;
          });
        });
      });

      document.querySelectorAll("[data-timing]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.timing = el.dataset.timing;
          });
        });
      });

      document.querySelectorAll("[data-slot]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.slot = el.dataset.slot;
          });
        });
      });

      document.querySelectorAll("[data-date]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.scheduleDate = el.dataset.date;
          });
        });
      });

      document.querySelectorAll("[data-nav]").forEach((el) => {
        el.addEventListener("click", () => navigate(el.dataset.nav));
      });

      document.querySelectorAll("[data-category]").forEach((el) => {
        el.addEventListener("click", () => {
          state.category = el.dataset.category;
          render();
        });
      });

      document.querySelectorAll("[data-detail]").forEach((el) => {
        el.addEventListener("click", (event) => {
          if (event.target.closest("[data-quick-add]") || event.target.closest("[data-detail-cta]")) return;
          commit(() => {
            state.selectedProductId = el.dataset.detail;
            state.detailQty = 1;
            state.screen = "detail";
          });
        });
      });

      document.querySelectorAll("[data-detail-cta]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.selectedProductId = el.dataset.detailCta;
            state.detailQty = 1;
            state.screen = "detail";
          });
        });
      });

      document.querySelectorAll("[data-quick-add]").forEach((el) => {
        el.addEventListener("click", (event) => {
          event.stopPropagation();
          quickAdd(el.dataset.quickAdd);
        });
      });

      document.querySelectorAll("[data-option]").forEach((el) => {
        el.addEventListener("click", () => {
          const product = getProduct(state.selectedProductId);
          const options = getSelectedOptions(product);
          const type = el.dataset.option;
          const value = el.dataset.value;
          if (type === "extras") {
            const exists = options.extras.includes(value);
            options.extras = exists ? options.extras.filter((item) => item !== value) : [...options.extras, value];
          } else {
            options[type] = value;
          }
          render();
        });
      });

      document.querySelectorAll("[data-qty]").forEach((el) => {
        el.addEventListener("click", () => {
          const change = Number(el.dataset.qty);
          state.detailQty = Math.max(1, state.detailQty + change);
          render();
        });
      });

      document.querySelectorAll("[data-cart-qty]").forEach((el) => {
        el.addEventListener("click", () => {
          const key = el.dataset.cartQty;
          const change = Number(el.dataset.change);
          commit(() => {
            state.cart = state.cart
              .map((item) => item.key === key ? { ...item, qty: item.qty + change } : item)
              .filter((item) => item.qty > 0);
          });
        });
      });

      document.querySelectorAll("[data-payment]").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.checkout.payment = el.dataset.payment;
          });
        });
      });

      document.querySelectorAll("[data-checkout-toggle]").forEach((el) => {
        el.addEventListener("click", () => {
          const key = el.dataset.checkoutToggle;
          commit(() => {
            state.checkout[key] = !state.checkout[key];
          });
        });
      });

      document.querySelectorAll("[data-action='to-home']").forEach((el) => {
        el.addEventListener("click", () => navigate("home"));
      });

      document.querySelectorAll("[data-action='start-order-flow']").forEach((el) => {
        el.addEventListener("click", () => navigate(state.mode === "delivery" ? "deliveryLocation" : "store"));
      });

      document.querySelectorAll("[data-action='to-delivery-map']").forEach((el) => {
        el.addEventListener("click", () => {
          if (!state.deliveryAddressInput.trim() && !state.selectedAddressId) return;
          navigate("deliveryMap");
        });
      });

      document.querySelectorAll("[data-address]").forEach((el) => {
        el.addEventListener("click", () => {
          const suggestion = addressSuggestions.find((item) => item.id === el.dataset.address);
          if (!suggestion) return;
          commit(() => {
            state.selectedAddressId = suggestion.id;
            state.deliveryAddressInput = suggestion.address[state.locale];
          });
        });
      });

      document.querySelectorAll("[data-action='confirm-delivery-address']").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            resolveDeliverySetup();
            state.browseOnlyMenu = false;
            state.screen = "menu";
          });
        });
      });

      document.querySelectorAll("[data-action='detail-add']").forEach((el) => {
        el.addEventListener("click", addFromDetail);
      });

      document.querySelectorAll("[data-action='start-order-prompt']").forEach((el) => {
        el.addEventListener("click", () => {
          window.alert(t().labels.browseOnlyAlert);
          navigate("location");
        });
      });

      document.querySelectorAll("[data-action='place-order']").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.screen = "confirmation";
          });
        });
      });

      document.querySelectorAll("[data-action='reset']").forEach((el) => {
        el.addEventListener("click", () => {
          commit(() => {
            state.screen = "home";
            state.cart = [];
            state.storeId = null;
            state.hasChosenStore = false;
            state.confirmedAddress = "";
            state.selectedAddressId = null;
            state.deliveryAddressInput = "";
            state.mode = "pickup";
            state.browseOnlyMenu = false;
          });
        });
      });

      document.querySelectorAll("[data-redeem]").forEach((el) => {
        el.addEventListener("click", () => {
          const cost = Number(el.dataset.redeem);
          if (cost > 1000) return;
          showToast(t().toasts.redeemed, `-${cost}`);
        });
      });

      const search = document.getElementById("menu-search");
      if (search) {
        search.addEventListener("input", () => {
          state.search = search.value;
          render();
        });
      }

      const address1 = document.getElementById("address1");
      const address2 = document.getElementById("address2");
      const deliveryAddressInput = document.getElementById("delivery-address-input");
      const orderNotes = document.getElementById("order-notes");
      if (address1) address1.addEventListener("input", () => { state.checkout.address1 = address1.value; });
      if (address2) address2.addEventListener("input", () => { state.checkout.address2 = address2.value; });
      if (deliveryAddressInput) {
        deliveryAddressInput.addEventListener("input", () => {
          state.deliveryAddressInput = deliveryAddressInput.value;
          state.selectedAddressId = null;
          render();
        });
      }
      if (orderNotes) orderNotes.addEventListener("input", () => { state.checkout.notes = orderNotes.value; });
    }

    function quickAdd(productId) {
      if (state.browseOnlyMenu) {
        window.alert(t().labels.browseOnlyAlert);
        navigate("location");
        return;
      }
      const product = getProduct(productId);
      const options = getSelectedOptions(product);
      const key = [product.id, options.heat, options.size, ...options.extras].join("|");
      const existing = state.cart.find((item) => item.key === key);

      commit(() => {
        if (existing) {
          existing.qty += 1;
        } else {
          state.cart.push({
            key,
            id: product.id,
            emoji: product.emoji,
            image: product.image,
            name: product.name[state.locale],
            price: product.basePrice,
            qty: 1,
            summary: [options.heat, options.size, ...options.extras].filter(Boolean).join(" · ")
          });
        }
      });

      showToast(t().toasts.added, "+50");
    }

    function addFromDetail() {
      if (state.browseOnlyMenu) {
        window.alert(t().labels.browseOnlyAlert);
        navigate("location");
        return;
      }
      const product = getProduct(state.selectedProductId);
      const options = getSelectedOptions(product);
      const key = [product.id, options.heat, options.size, ...options.extras].join("|");
      const existing = state.cart.find((item) => item.key === key);

      commit(() => {
        if (existing) {
          existing.qty += state.detailQty;
        } else {
          state.cart.push({
            key,
            id: product.id,
            emoji: product.emoji,
            image: product.image,
            name: product.name[state.locale],
            price: product.basePrice + (options.extras.length * 0.5),
            qty: state.detailQty,
            summary: [options.heat, options.size, ...options.extras].filter(Boolean).join(" · ")
          });
        }
        state.screen = "cart";
      });

      showToast(t().toasts.added, `+${state.detailQty * 50}`);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      renderTopbar();
      renderBottomNav();
      els.content.innerHTML = renderScreen();
      if (state.screen !== "detail") {
        els.detailFooter.hidden = true;
        els.detailFooter.innerHTML = "";
      }
      attachEvents();
    }

    els.back.addEventListener("click", goBack);
    els.forward.addEventListener("click", goForward);
    fullscreenBtn.addEventListener("click", async () => {
      if (window.self !== window.top) {
        embeddedFullscreenMode = !embeddedFullscreenMode;
        stageEl.classList.toggle("fullscreen-mode", embeddedFullscreenMode);
        window.parent.postMessage(
          { type: "rna-prototype-fullscreen", enabled: embeddedFullscreenMode },
          window.location.origin
        );
        renderTopbar();
        return;
      }

      if (document.fullscreenElement) {
        await document.exitFullscreen();
      } else if (stageEl.requestFullscreen) {
        await stageEl.requestFullscreen();
      } else {
        stageEl.classList.toggle("fullscreen-mode");
      }
      renderTopbar();
    });
    document.addEventListener("fullscreenchange", () => {
      renderTopbar();
    });
    document.querySelectorAll("[data-locale]").forEach((button) => {
      button.addEventListener("click", () => setLocale(button.dataset.locale));
    });

    render();
  </script>
</body>
</html>
